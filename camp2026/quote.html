<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>學校／機構端報價單產生器 · 布拉克星球</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(180deg, #FFF8F0, #f5f5f5);
    min-height: 100vh;
    color: #333;
  }

  /* ===== 密碼閘口（跟 admin 共用 session key） ===== */
  .gate { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
  .gate-card { background: #fff; border-radius: 20px; padding: 32px 28px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .gate-card h1 { font-size: 1.3rem; color: #F5941E; margin-bottom: 6px; }
  .gate-card .sub { font-size: .82rem; color: #888; margin-bottom: 18px; }
  .gate-card input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 2px solid #eee; font-size: 1rem; font-family: inherit; font-weight: 700; outline: none; text-align: center; letter-spacing: 4px; }
  .gate-card input:focus { border-color: #F5941E; }
  .gate-card .err { color: #C93A2A; font-size: .82rem; font-weight: 700; margin-top: 10px; min-height: 18px; }
  .gate-card button { width: 100%; padding: 14px; margin-top: 14px; border-radius: 50px; background: linear-gradient(135deg,#F5941E,#E07A08); color: #fff; font-weight: 900; font-size: 1rem; border: none; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px rgba(245,148,30,.3); }

  /* ===== 主容器 ===== */
  .top-bar {
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(135deg,#002E51,#0F5E7A);
    color: #FFD100;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  .top-bar h1 { font-size: 1.05rem; font-weight: 900; letter-spacing: 1px; }
  .top-bar a.back { color: #FFD100; font-size: .82rem; font-weight: 700; text-decoration: none; padding: 6px 14px; background: rgba(255,255,255,.1); border-radius: 50px; }
  .top-bar a.back:hover { background: rgba(255,255,255,.2); }

  .qb-grid {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    min-height: calc(100vh - 56px);
  }
  .qb-form {
    padding: 20px 22px 40px;
    overflow-y: auto;
    background: #fafafa;
    border-right: 2px solid #eee;
  }
  .qb-section { margin-bottom: 16px; }
  .qb-label { font-size: .78rem; color: #666; font-weight: 700; margin-bottom: 5px; letter-spacing: .5px; }
  .qb-form input[type="text"], .qb-form input[type="date"], .qb-form input[type="number"] {
    width: 100%; padding: 10px 12px; border: 2px solid #ddd; border-radius: 8px;
    font-family: inherit; font-size: .9rem; outline: none; transition: border-color .15s;
  }
  .qb-form input:focus { border-color: #002E51; }

  .qb-item-row {
    display: grid;
    grid-template-columns: 1fr 60px 80px 30px;
    gap: 5px;
    margin-bottom: 5px;
    align-items: center;
  }
  .qb-item-row input { padding: 7px 10px; border: 1.5px solid #ddd; border-radius: 6px; font-family: inherit; font-size: .85rem; outline: none; min-width: 0; }
  .qb-item-row input:focus { border-color: #002E51; }
  .qb-item-row input[type="number"] { text-align: center; font-variant-numeric: tabular-nums; }
  .qb-del { width: 26px; height: 26px; border: none; background: #ffebee; color: #c62828; border-radius: 50%; cursor: pointer; font-weight: 900; padding: 0; display: flex; align-items: center; justify-content: center; }
  .qb-del:hover { background: #c62828; color: #fff; }

  .qb-preset {
    background: #FFF9D6;
    border: 2px dashed #FFD100;
    border-radius: 10px;
    padding: 10px 12px;
  }
  .qb-preset-title { font-size: .78rem; color: #002E51; font-weight: 700; margin-bottom: 6px; }
  .qb-preset button { width: 100%; padding: 10px 14px; background: #002E51; color: #FFD100; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; font-family: inherit; font-size: .88rem; }
  .qb-preset .note { font-size: .7rem; color: #666; margin-top: 6px; line-height: 1.6; }

  .qb-clear { padding: 6px 12px; background: none; border: 1.5px dashed #aaa; color: #666; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: .78rem; }

  .qb-total { background: #002E51; color: #FFD100; padding: 14px 16px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
  .qb-total .amt { font-size: 1.4rem; font-variant-numeric: tabular-nums; }

  .qb-btn-primary {
    width: 100%; padding: 16px; background: #FFD100; color: #002E51;
    border: 3px solid #002E51; border-radius: 10px;
    font-weight: 900; font-size: 1rem; cursor: pointer; font-family: inherit;
    box-shadow: 4px 4px 0 #0F1F3A;
    transition: all .15s cubic-bezier(.34,1.56,.64,1);
  }
  .qb-btn-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #0F1F3A; }
  .qb-btn-primary:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #0F1F3A; }

  .qb-preview-wrap {
    background: #e8e8e8;
    overflow-y: auto;
    padding: 24px;
    min-height: calc(100vh - 56px);
    display: flex; flex-direction: column; align-items: center;
  }
  .qb-preview-label { font-size: .82rem; color: #555; font-weight: 700; margin-bottom: 10px; }
  .qb-preview {
    background: #fff;
    width: 100%;
    max-width: 794px;
    padding: 50px 55px;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    font-family: 'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif;
    color: #000;
  }

  /* 報價單 paper 內容樣式 */
  .quote-paper .q-brand { font-size: 26px; font-weight: 900; text-align: center; margin: 0 0 6px; letter-spacing: 2px; }
  .quote-paper .q-addr, .quote-paper .q-tel { text-align: center; font-size: 13px; font-weight: 700; margin: 2px 0; }
  .quote-paper .q-en { text-align: center; font-size: 24px; margin: 18px 0 2px; font-weight: 700; letter-spacing: 3px; }
  .quote-paper .q-zh { text-align: center; font-size: 28px; margin: 0 0 22px; font-weight: 900; letter-spacing: 12px; }
  .quote-paper .q-meta { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin: 10px 0 6px; gap: 10px; flex-wrap: wrap; }
  .quote-paper .q-addr-line { font-size: 13px; font-weight: 700; margin-bottom: 14px; }
  .quote-paper table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  .quote-paper table th { border: 1px solid #000; background: #f2f2f2; padding: 6px 3px; font-weight: 700; text-align: center; }
  .quote-paper table td { border: 1px solid #000; padding: 8px 6px; font-variant-numeric: tabular-nums; word-break: break-word; }
  .quote-paper table td:nth-child(1) { width: 8%; text-align: center; }
  .quote-paper table td:nth-child(2) { width: 44%; text-align: center; }
  .quote-paper table td:nth-child(3) { width: 10%; text-align: center; }
  .quote-paper table td:nth-child(4) { width: 18%; text-align: left; padding-left: 10px; }
  .quote-paper table td:nth-child(5) { width: 20%; text-align: left; padding-left: 10px; }
  .quote-paper .q-footer { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; font-size: 13px; font-weight: 700; flex-wrap: wrap; gap: 10px; }
  .quote-paper .q-footer .q-total-line { font-size: 15px; font-weight: 900; }
  .quote-paper .q-note { font-size: 11px; margin-top: 4px; }

  /* ===== 手機版 ===== */
  @media (max-width: 900px) {
    .qb-grid { grid-template-columns: 1fr; }
    .qb-form { border-right: none; border-bottom: 3px solid #eee; padding: 18px 16px 24px; }
    .qb-preview-wrap { padding: 16px 12px 40px; min-height: auto; }
    .qb-preview { padding: 24px 18px; max-width: 100%; }
    .quote-paper .q-brand { font-size: 20px; letter-spacing: 1px; }
    .quote-paper .q-addr, .quote-paper .q-tel { font-size: 11px; }
    .quote-paper .q-en { font-size: 18px; margin: 14px 0 2px; letter-spacing: 2px; }
    .quote-paper .q-zh { font-size: 22px; margin-bottom: 16px; letter-spacing: 8px; }
    .quote-paper .q-meta { font-size: 12px; }
    .quote-paper .q-addr-line { font-size: 12px; }
    .quote-paper table { font-size: 10.5px; }
    .quote-paper table th { padding: 5px 2px; }
    .quote-paper table td { padding: 6px 3px; }
    .quote-paper table td:nth-child(4), .quote-paper table td:nth-child(5) { padding-left: 6px; }
    .quote-paper .q-footer { font-size: 11.5px; }
    .quote-paper .q-footer .q-total-line { font-size: 13px; }
  }

  @media print {
    body * { visibility: hidden; }
    .qb-preview, .qb-preview * { visibility: visible; }
    .qb-preview { position: absolute; left: 0; top: 0; box-shadow: none; width: 100%; max-width: 100%; padding: 15mm 18mm; }
    .qb-preview-label { display: none; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>
<body>

<!-- 密碼閘口 -->
<div id="gate" class="gate">
  <div class="gate-card">
    <h1>🔒 內部工具</h1>
    <div class="sub">學校／機構端報價單產生器</div>
    <input type="password" id="gatePass" placeholder="請輸入密碼" />
    <div class="err" id="gateErr"></div>
    <button id="gateBtn">🔓 進入</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="top-bar">
    <h1>📄 學校／機構端報價單產生器</h1>
    <a href="admin.html" class="back">← 返回總後台</a>
  </div>

  <div class="qb-grid">
    <div class="qb-form">
      <div class="qb-section">
        <div class="qb-label">抬頭（TO）</div>
        <input id="qSchool" type="text" placeholder="臺南市立九份子國民中小學" />
      </div>
      <div class="qb-section">
        <div class="qb-label">收件地址</div>
        <input id="qAddress" type="text" placeholder="台南市安南區九份子大道 8 號" />
      </div>
      <div class="qb-section">
        <div class="qb-label">報價日期</div>
        <input id="qDate" type="date" />
      </div>

      <div class="qb-section">
        <div class="qb-label" style="display:flex;justify-content:space-between;align-items:center">
          <span>品項清單（最多 13 項，空項自動補 0）</span>
          <button onclick="addQuoteItem()" style="padding:4px 12px;background:#FFD100;color:#002E51;border:none;border-radius:50px;font-weight:900;font-size:.78rem;cursor:pointer;font-family:inherit">+ 新增</button>
        </div>
        <div id="qItems" style="margin-top:8px"></div>
        <div class="qb-preset" style="margin-top:10px">
          <div class="qb-preset-title">🧱 SPIKE 品項單價清單</div>
          <button onclick="applySpikePreset()">🔁 載入 SPIKE 品項（單價）</button>
          <div class="note">
            載入後：45678 $15,900、45681 $5,000、矽膠輪胎 $160、搖桿＋接收器 $1,200<br>
            <b style="color:#002E51">數量請依需求填入</b>
          </div>
        </div>
        <div style="margin-top:8px">
          <button onclick="clearQuoteItems()" class="qb-clear">🗑️ 清空全部品項</button>
        </div>
      </div>

      <div class="qb-total qb-section">
        <span>合計</span>
        <span class="amt" id="qTotal">$0</span>
      </div>

      <button onclick="printQuote()" class="qb-btn-primary">🖨️ 列印／存 PDF</button>
    </div>

    <div class="qb-preview-wrap">
      <div class="qb-preview-label">👁️ 即時預覽（列印時為 A4）</div>
      <div id="qPreview" class="qb-preview"></div>
    </div>
  </div>
</div>

<script>
  // ===== 密碼閘口（跟 admin 共用） =====
  const SITE_PASS = 'BLOCK';
  const SITE_UNLOCK_KEY = 'bp_admin_unlocked_v1';
  function unlockGate() {
    const input = document.getElementById('gatePass');
    const err = document.getElementById('gateErr');
    if ((input.value || '').trim().toUpperCase() === SITE_PASS) {
      sessionStorage.setItem(SITE_UNLOCK_KEY, '1');
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = '';
      initQuote();
    } else {
      err.textContent = '❌ 密碼錯誤';
      input.value = '';
      input.focus();
    }
  }
  if (sessionStorage.getItem(SITE_UNLOCK_KEY) === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = '';
    setTimeout(initQuote, 10);
  } else {
    setTimeout(() => document.getElementById('gatePass').focus(), 100);
  }
  document.getElementById('gateBtn').addEventListener('click', unlockGate);
  document.getElementById('gatePass').addEventListener('keydown', e => { if (e.key === 'Enter') unlockGate(); });

  // ===== 報價單邏輯 =====
  const QUOTE_PRESETS = {
    spike: [
      { name: 'LEGO SPIKE PRIME  編號 45678', unit: 15900 },
      { name: 'LEGO SPIKE  擴充套件  編號 45681', unit: 5000 },
      { name: '樂高矽膠輪胎', unit: 160 },
      { name: '樂高搖桿＋接收器', unit: 1200 }
    ]
  };
  const LS_QUOTE = 'bp_spike_quote_v1';
  let _quoteItems = [];

  function escapeHTML(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function initQuote() {
    try {
      const raw = localStorage.getItem(LS_QUOTE);
      if (raw) {
        const d = JSON.parse(raw);
        document.getElementById('qSchool').value = d.school || '';
        document.getElementById('qAddress').value = d.address || '';
        document.getElementById('qDate').value = d.date || new Date().toISOString().slice(0,10);
        _quoteItems = Array.isArray(d.items) && d.items.length ? d.items : QUOTE_PRESETS.spike.map(it => ({ name: it.name, qty: 0, unit: it.unit }));
      } else {
        document.getElementById('qDate').value = new Date().toISOString().slice(0,10);
        _quoteItems = QUOTE_PRESETS.spike.map(it => ({ name: it.name, qty: 0, unit: it.unit }));
      }
    } catch(_) {
      _quoteItems = QUOTE_PRESETS.spike.map(it => ({ name: it.name, qty: 0, unit: it.unit }));
    }
    renderQuoteItems();
    renderQuotePreview();
  }

  function renderQuoteItems() {
    const wrap = document.getElementById('qItems');
    wrap.innerHTML = _quoteItems.map((it, i) => `
      <div class="qb-item-row">
        <input type="text" placeholder="品名／規格" value="${escapeHTML(it.name)}" data-k="name" data-i="${i}">
        <input type="number" min="0" placeholder="數量" value="${it.qty || ''}" data-k="qty" data-i="${i}">
        <input type="number" min="0" placeholder="單價" value="${it.unit || ''}" data-k="unit" data-i="${i}">
        <button class="qb-del" onclick="removeQuoteItem(${i})" aria-label="刪除">✕</button>
      </div>
    `).join('');
    wrap.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const k = e.target.dataset.k;
        const idx = parseInt(e.target.dataset.i);
        if (!_quoteItems[idx]) return;
        _quoteItems[idx][k] = (k === 'name') ? e.target.value : (parseInt(e.target.value) || 0);
        renderQuotePreview();
        saveQuoteDraft();
      });
    });
  }
  function addQuoteItem() {
    if (_quoteItems.length >= 13) { alert('最多 13 項'); return; }
    _quoteItems.push({ name: '', qty: 0, unit: 0 });
    renderQuoteItems();
    renderQuotePreview();
    saveQuoteDraft();
  }
  function removeQuoteItem(i) {
    _quoteItems.splice(i, 1);
    renderQuoteItems();
    renderQuotePreview();
    saveQuoteDraft();
  }
  function applySpikePreset() {
    _quoteItems = QUOTE_PRESETS.spike.map(it => ({ name: it.name, qty: 0, unit: it.unit }));
    renderQuoteItems();
    renderQuotePreview();
    saveQuoteDraft();
  }
  function clearQuoteItems() {
    if (!confirm('確定清空所有品項？')) return;
    _quoteItems = [];
    renderQuoteItems();
    renderQuotePreview();
    saveQuoteDraft();
  }
  function saveQuoteDraft() {
    try {
      localStorage.setItem(LS_QUOTE, JSON.stringify({
        school: document.getElementById('qSchool').value,
        address: document.getElementById('qAddress').value,
        date: document.getElementById('qDate').value,
        items: _quoteItems
      }));
    } catch(_) {}
  }
  document.addEventListener('input', (e) => {
    if (['qSchool','qAddress','qDate'].includes(e.target.id)) {
      renderQuotePreview();
      saveQuoteDraft();
    }
  });

  function buildQuoteHTML() {
    const school = (document.getElementById('qSchool').value || '').trim();
    const address = (document.getElementById('qAddress').value || '').trim();
    const dateStr = (document.getElementById('qDate').value || '').trim();
    const items = _quoteItems.slice(0, 13);
    const rows = items.slice();
    while (rows.length < 13) rows.push({ name: '', qty: 0, unit: 0 });
    let total = 0;
    const rowsHTML = rows.map((it, i) => {
      const qty = it.qty || 0;
      const unit = it.unit || 0;
      const sub = qty * unit;
      // 數量為 0 視為空列：品名/單價/小計全部顯示 0（不計入合計）
      const isEmpty = qty === 0;
      if (!isEmpty) total += sub;
      return `<tr>
        <td>${i + 1}</td>
        <td>${isEmpty ? '0' : escapeHTML(it.name)}</td>
        <td>${isEmpty ? 0 : qty}</td>
        <td>${isEmpty ? '$0.00' : '$' + unit.toLocaleString()}</td>
        <td>${isEmpty ? '$0.00' : '$' + sub.toLocaleString()}</td>
      </tr>`;
    }).join('');
    return {
      html: `<div class="quote-paper">
        <h1 class="q-brand">布拉克星球教育機構</h1>
        <div class="q-addr">台南市北區中華北路二段 113 號</div>
        <div class="q-tel">電話:06-2089382</div>
        <h2 class="q-en">QUOTATION</h2>
        <h2 class="q-zh">報 價 單</h2>
        <div class="q-meta">
          <span>TO: ${escapeHTML(school)}</span>
          <span>DATE: ${escapeHTML(dateStr.replace(/-/g, '/'))}</span>
        </div>
        <div class="q-addr-line">地址: ${escapeHTML(address)}</div>
        <table>
          <thead>
            <tr><th>編號</th><th>品名／規格</th><th>數量</th><th>單價</th><th>小計</th></tr>
          </thead>
          <tbody>${rowsHTML}</tbody>
        </table>
        <div class="q-footer">
          <span>確認無誤回傳報價單</span>
          <span class="q-total-line">合 計：$${total.toLocaleString()}</span>
        </div>
        <div class="q-note">以上報價均為含稅價格</div>
      </div>`,
      total
    };
  }
  function renderQuotePreview() {
    const { html, total } = buildQuoteHTML();
    document.getElementById('qPreview').innerHTML = html;
    document.getElementById('qTotal').textContent = '$' + total.toLocaleString();
  }

  function printQuote() {
    const { html } = buildQuoteHTML();
    const css = `
      @page { size: A4; margin: 15mm 18mm; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; font-family: 'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif; color:#000; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .quote-paper { max-width: 100%; }
      .q-brand { font-size: 28pt; font-weight: 900; text-align: center; margin: 0 0 6px; letter-spacing: 2px; }
      .q-addr, .q-tel { text-align: center; font-size: 11pt; font-weight: 700; margin: 2px 0; }
      .q-en { text-align: center; font-size: 22pt; margin: 18px 0 2px; font-weight: 700; letter-spacing: 3px; }
      .q-zh { text-align: center; font-size: 26pt; margin: 0 0 22px; font-weight: 900; letter-spacing: 14px; }
      .q-meta { display: flex; justify-content: space-between; font-size: 12pt; font-weight: 700; margin: 10px 0 6px; }
      .q-addr-line { font-size: 12pt; font-weight: 700; margin-bottom: 14px; }
      table { width: 100%; border-collapse: collapse; font-size: 11pt; }
      th { border: 1px solid #000; background: #f2f2f2; padding: 8px 4px; font-weight: 700; text-align: center; }
      td { border: 1px solid #000; padding: 10px 8px; font-variant-numeric: tabular-nums; }
      td:nth-child(1) { width: 8%; text-align: center; }
      td:nth-child(2) { width: 44%; text-align: center; }
      td:nth-child(3) { width: 10%; text-align: center; }
      td:nth-child(4) { width: 18%; text-align: left; padding-left: 14px; }
      td:nth-child(5) { width: 20%; text-align: left; padding-left: 14px; }
      .q-footer { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; font-size: 12pt; font-weight: 700; }
      .q-footer .q-total-line { font-size: 14pt; font-weight: 900; }
      .q-note { font-size: 10pt; margin-top: 4px; }
    `;
    const school = (document.getElementById('qSchool').value || '報價單').trim();
    const full = `<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>${escapeHTML(school)} - 報價單</title><style>${css}</style></head><body>${html}</body></html>`;
    const blob = new Blob([full], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if (!w) { alert('請允許彈出視窗以列印報價單'); return; }
    w.addEventListener('load', () => { setTimeout(() => { w.print(); setTimeout(() => URL.revokeObjectURL(url), 8000); }, 400); });
  }
</script>
