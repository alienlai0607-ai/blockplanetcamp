<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>老師後台｜營隊名單</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; color: #333; padding: 20px; line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.5rem; color: #F5941E; margin-bottom: 8px; }
    .sub { font-size: .9rem; color: #888; margin-bottom: 24px; }
    .loading { text-align: center; padding: 60px; color: #aaa; }

    .camp-card {
      background: white; border-radius: 14px; margin-bottom: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); overflow: hidden;
    }
    .camp-head {
      padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; background: white; transition: background .2s;
    }
    .camp-head:hover { background: #FFF8F0; }
    .camp-title { font-size: 1.05rem; font-weight: 900; color: #333; }
    .camp-count {
      background: #F5941E; color: white; padding: 4px 14px; border-radius: 50px;
      font-size: .85rem; font-weight: 900;
    }
    .camp-body { display: none; padding: 0 18px 18px; border-top: 1px solid #f0f0f0; }
    .camp-body.open { display: block; }

    .session-group {
      margin-top: 14px;
    }
    .session-title {
      font-size: .92rem; font-weight: 900; color: #666; padding: 8px 12px;
      background: #f9f9f9; border-radius: 8px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .session-count { font-size: .78rem; color: #888; font-weight: 700; }

    .student-row {
      display: grid; grid-template-columns: auto 1fr auto; gap: 10px;
      padding: 10px 12px; border-bottom: 1px solid #f0f0f0; align-items: center;
    }
    .student-row:last-child { border-bottom: none; }
    .student-num { color: #bbb; font-weight: 700; font-size: .85rem; min-width: 28px; }
    .student-info { font-size: .88rem; }
    .student-name { font-weight: 900; font-size: .95rem; color: #333; }
    .student-name small { font-weight: 600; color: #888; font-size: .78rem; margin-left: 6px; }
    .student-detail { font-size: .78rem; color: #888; margin-top: 2px; }
    .student-right { text-align: right; }
    .payment {
      display: inline-block; padding: 2px 10px; border-radius: 50px;
      font-size: .72rem; font-weight: 700;
    }
    .payment-paid { background: #E8F5E9; color: #2E7D32; }
    .payment-unpaid { background: #FFEBEE; color: #C62828; }
    .payment-pending { background: #FFF3E0; color: #E65100; }

    .alert {
      background: #FFEBEE; border: 1.5px solid #FFCDD2; border-radius: 8px;
      padding: 8px 12px; margin-top: 6px; font-size: .82rem; color: #C62828;
    }
    .alert-title { font-weight: 900; margin-bottom: 2px; }
    .note {
      background: #FFF8E1; border-left: 3px solid #FFC107; padding: 6px 10px;
      margin-top: 6px; font-size: .8rem; color: #795548;
    }
    .sibling {
      background: #E3F2FD; border-radius: 6px; padding: 2px 8px;
      font-size: .72rem; color: #1565C0; font-weight: 700; margin-left: 6px;
    }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn {
      padding: 8px 14px; border-radius: 8px; font-size: .85rem; font-weight: 700;
      border: none; cursor: pointer; font-family: inherit; text-decoration: none;
      display: inline-block; transition: transform .1s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: #F5941E; color: white; }
    .btn-secondary { background: #e0e0e0; color: #333; }

    .refresh {
      position: fixed; bottom: 20px; right: 20px;
      padding: 12px 20px; border-radius: 50px;
      background: #F5941E; color: white; font-weight: 900; font-size: .9rem;
      border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(245,148,30,.4);
      font-family: inherit;
    }

    /* 列印樣式 */
    @media print {
      body { background: white; padding: 0; }
      .refresh, .btn-row, .no-print { display: none !important; }
      .camp-card { box-shadow: none; page-break-after: always; margin: 0; }
      .camp-body { display: block !important; }
      .print-page { page-break-after: always; }
    }

    /* 點名表專用列印樣式 */
    .print-roll-call {
      display: none;
    }
    @media print {
      .print-roll-call.active { display: block; }
      .print-roll-call.active ~ * { display: none; }
      body.print-mode .container > *:not(.print-roll-call) { display: none; }
      body.print-mode .print-roll-call { display: block; }
    }
    .roll-call-table {
      width: 100%; border-collapse: collapse; margin-top: 16px;
    }
    .roll-call-table th, .roll-call-table td {
      border: 1.5px solid #333; padding: 10px 8px; text-align: center;
    }
    .roll-call-table th { background: #FFF3E0; font-weight: 900; }
    .roll-call-title { font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 8px; }
    .roll-call-info { text-align: center; margin-bottom: 16px; color: #666; }
  </style>
</head>
<body>
<div class="container">
  <h1>👩‍🏫 老師後台 — 營隊名單</h1>
  <div class="sub">依營隊 / 梯次整理，主教老師專用</div>
  <div id="content" class="loading">載入中...</div>
</div>

<button class="refresh" onclick="loadData()">↻ 更新</button>

<div class="print-roll-call" id="rollCall"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwpmE8j_XgffMub30avSjMC4cLDl71ijARJfbOgnpwmOSdu7zq6mGL_uAcua3VFwk3G/exec';

// 從 session 文字解析日期
function parseDates(session) {
  if (!session) return [];
  // 抓「8/10-8/14」或「8/10（一）～8/14（五）」等格式
  const m = session.match(/(\d{1,2})\/(\d{1,2})[^\d]*?(\d{1,2})\/(\d{1,2})/);
  if (!m) return [];
  const [_, m1, d1, m2, d2] = m.map(Number);
  const dates = [];
  const start = new Date(2026, m1 - 1, d1);
  const end = new Date(2026, m2 - 1, d2);
  const cursor = new Date(start);
  while (cursor <= end && dates.length < 10) {
    dates.push((cursor.getMonth() + 1) + '/' + cursor.getDate());
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}

function paymentBadge(status) {
  const s = (status || '').trim();
  if (!s) return '<span class="payment payment-pending">⏳ 未確認</span>';
  if (s.includes('已') || s.includes('完') || s.includes('OK') || s.includes('是')) {
    return '<span class="payment payment-paid">✅ 已付款</span>';
  }
  if (s.includes('未') || s.includes('待') || s.includes('否')) {
    return '<span class="payment payment-unpaid">❌ 未付款</span>';
  }
  return '<span class="payment payment-pending">⏳ ' + s + '</span>';
}

// 找兄弟姐妹（同家長電話）
function findSiblings(students, phone) {
  if (!phone) return [];
  return students.filter(s => s.parentPhone && s.parentPhone === phone);
}

function render(data) {
  if (!data.camps || data.camps.length === 0) {
    document.getElementById('content').innerHTML = '<div class="loading">尚無報名資料</div>';
    return;
  }

  // 建立跨營隊的兄弟姐妹查找表
  const allStudents = [];
  data.camps.forEach(c => c.students.forEach(s => allStudents.push({...s, camp: c.name})));

  let html = '';
  data.camps.forEach((camp, ci) => {
    // 依梯次分組
    const sessionMap = {};
    camp.students.forEach(s => {
      const key = s.session || '(未指定梯次)';
      if (!sessionMap[key]) sessionMap[key] = [];
      sessionMap[key].push(s);
    });

    html += `<div class="camp-card">
      <div class="camp-head" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="camp-title">${camp.name}</div>
        <div class="camp-count">👥 ${camp.count} 人</div>
      </div>
      <div class="camp-body">`;

    Object.keys(sessionMap).forEach(session => {
      const students = sessionMap[session];
      html += `<div class="session-group">
        <div class="session-title">
          <span>📅 ${session}</span>
          <span class="session-count">共 ${students.length} 人</span>
        </div>`;

      students.forEach((s, i) => {
        // 找兄弟姐妹
        const siblings = allStudents.filter(x =>
          x.parentPhone && s.parentPhone &&
          x.parentPhone === s.parentPhone &&
          x.name !== s.name
        );
        const siblingNames = [...new Set(siblings.map(x => x.name))];

        // 重要警示
        const alerts = [];
        if (s.allergy && s.allergy !== '無') alerts.push('⚠️ 過敏/用藥：' + s.allergy);
        if (s.health && s.health !== '無' && s.health !== '良好') alerts.push('🏥 健康：' + s.health);

        html += `<div class="student-row">
          <div class="student-num">${i + 1}</div>
          <div class="student-info">
            <div class="student-name">
              ${s.name}
              ${s.gender ? `<small>${s.gender}</small>` : ''}
              ${s.grade ? `<small>${s.grade}</small>` : ''}
              ${siblingNames.length > 0 ? `<span class="sibling">👨‍👩‍👧 兄弟姊妹：${siblingNames.join('、')}</span>` : ''}
            </div>
            <div class="student-detail">
              ${s.parentName ? `👤 ${s.parentName}` : ''}
              ${s.parentPhone ? ` ｜ 📱 ${s.parentPhone}` : ''}
              ${s.diet ? ` ｜ 🍽️ ${s.diet}` : ''}
              ${s.lineId ? ` ｜ LINE: ${s.lineId}` : ''}
            </div>
            ${alerts.length > 0 ? `<div class="alert">
              ${alerts.map(a => '<div>' + a + '</div>').join('')}
            </div>` : ''}
            ${s.note ? `<div class="note">📝 備註：${s.note}</div>` : ''}
          </div>
          <div class="student-right">
            ${paymentBadge(s.payment)}
          </div>
        </div>`;
      });

      html += `<div class="btn-row no-print">
        <button class="btn btn-primary" onclick="printRollCall('${camp.name}', '${session}', ${JSON.stringify(students.map(s => ({n:s.name, g:s.grade, a:s.allergy}))).replace(/"/g, '&quot;')})">🖨️ 列印簽到單</button>
      </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function printRollCall(campName, session, students) {
  const dates = parseDates(session);
  const dateHeaders = dates.length > 0
    ? dates.map(d => `<th style="width:80px">${d}</th>`).join('')
    : '<th style="width:80px">簽到</th>';

  let rows = '';
  students.forEach((s, i) => {
    rows += `<tr>
      <td>${i + 1}</td>
      <td style="text-align:left;padding-left:12px">${s.n}${s.g ? ' (' + s.g + ')' : ''}</td>
      ${(dates.length > 0 ? dates : ['']).map(() => '<td></td>').join('')}
      <td style="text-align:left;padding-left:12px">${s.a && s.a !== '無' ? '⚠️ ' + s.a : ''}</td>
    </tr>`;
  });

  const printWindow = window.open('', '_blank');
  printWindow.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8"><title>簽到單 - ${campName}</title>
    <style>
      body { font-family: 'Noto Sans TC', sans-serif; padding: 20px; }
      h1 { text-align: center; font-size: 20pt; margin-bottom: 4px; }
      .info { text-align: center; color: #666; margin-bottom: 16px; font-size: 11pt; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1.5px solid #333; padding: 10px 8px; text-align: center; font-size: 11pt; }
      th { background: #FFF3E0; font-weight: 900; }
      @media print { body { padding: 0; } }
    </style></head><body>
    <h1>${campName}</h1>
    <div class="info">${session}</div>
    <table>
      <tr><th style="width:40px">No.</th><th>姓名</th>${dateHeaders}<th style="width:160px">備註</th></tr>
      ${rows}
    </table>
    <script>window.print();</sc` + `ript>
    </body></html>
  `);
  printWindow.document.close();
}

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(API + '?action=teacher');
    const data = await res.json();
    if (data.success) render(data);
    else document.getElementById('content').innerHTML = '<div class="loading">載入失敗</div>';
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading">載入失敗，請重新整理</div>';
  }
}

loadData();
</script>
</body></html>
