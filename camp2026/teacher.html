<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>2026暑期營隊總名單｜老師後台工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(180deg, #FFF8F0, #f5f5f5); min-height: 100vh; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { font-size: 1.5rem; color: #F5941E; font-weight: 900; }
    .sub { font-size: .85rem; color: #888; }
    .refresh-btn { padding: 8px 18px; background: white; border: 1.5px solid #F5941E; color: #F5941E; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: .85rem; font-family: inherit; }
    .refresh-btn:hover { background: #F5941E; color: white; }
    .loading { text-align: center; padding: 80px 20px; color: #aaa; font-size: 1rem; }

    /* 統計列 */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat { background: white; padding: 14px 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.04); text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 900; color: #F5941E; }
    .stat-label { font-size: .72rem; color: #888; font-weight: 700; margin-top: 2px; }

    /* 營隊卡片格 */
    .camps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .camp-card {
      background: white; border-radius: 12px; padding: 14px 16px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: all .2s;
      border-left: 5px solid #F5941E; position: relative;
    }
    .camp-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.1); }
    .camp-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; gap: 8px; }
    .camp-name { font-size: 1.15rem; font-weight: 900; color: #333; line-height: 1.3; flex: 1; }
    .camp-count-badge {
      background: linear-gradient(135deg, #F5941E, #E07A08);
      color: white; padding: 4px 12px; border-radius: 50px;
      font-size: 1rem; font-weight: 900; white-space: nowrap;
    }
    .camp-alerts { font-size: .82rem; color: #C93A2A; font-weight: 700; margin-top: 6px; }
    .camp-payment-line { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge-mini { padding: 2px 10px; border-radius: 50px; font-weight: 700; font-size: .78rem; }

    /* Modal 彈窗 */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; z-index: 9999; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 900px; margin: 20px 0; overflow: hidden; }
    .modal-head { padding: 18px 24px; background: linear-gradient(135deg, #F5941E, #E07A08); color: white; display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 1.1rem; font-weight: 900; }
    .modal-close { background: rgba(255,255,255,.3); border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.1rem; }
    .modal-body { padding: 16px 20px; max-height: 70vh; overflow-y: auto; }

    .session-section { margin-bottom: 18px; }
    .session-title { font-size: .88rem; font-weight: 900; color: #666; padding: 8px 12px; background: #FFF8F0; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .session-count { font-size: .75rem; color: #888; }

    .student-row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; padding: 12px; border-bottom: 1px solid #f0f0f0; align-items: start; }
    .student-row:last-child { border-bottom: none; }
    .student-num { color: #bbb; font-weight: 700; font-size: .85rem; padding-top: 2px; }
    .student-name { font-weight: 900; font-size: .95rem; color: #333; }
    .student-name small { font-weight: 600; color: #888; font-size: .75rem; margin-left: 6px; }
    .sibling-tag { background: #E3F2FD; color: #1565C0; padding: 1px 7px; border-radius: 50px; font-size: .68rem; font-weight: 700; margin-left: 4px; }
    .student-detail { font-size: .76rem; color: #888; margin-top: 3px; line-height: 1.6; }
    .alert-box { background: #FFEBEE; border: 1.5px solid #FFCDD2; border-radius: 8px; padding: 6px 10px; margin-top: 5px; font-size: .78rem; color: #C62828; }
    .note-box { background: #FFF8E1; border-left: 3px solid #FFC107; padding: 4px 8px; margin-top: 5px; font-size: .75rem; color: #795548; }
    .payment { padding: 3px 10px; border-radius: 50px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
    .payment-paid { background: #E8F5E9; color: #2E7D32; }
    .payment-unpaid { background: #FFEBEE; color: #C62828; }
    .payment-pending { background: #FFF3E0; color: #E65100; }

    .print-btn { display: block; width: 100%; padding: 10px; margin-top: 8px; background: #F5941E; color: white; font-weight: 900; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; font-family: inherit; }
    .print-btn:hover { background: #E07A08; }

    @media (max-width: 480px) {
      .container { padding: 12px; }
      .camps-grid { grid-template-columns: 1fr; }
      .modal-content { margin: 0; border-radius: 12px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>👩‍🏫 2026 暑期營隊總名單</h1>
      <div class="sub">老師後台工具｜點選營隊查看詳細名單</div>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ 更新資料</button>
  </div>

  <div class="stats" id="stats" style="display:none"></div>
  <div id="content" class="loading">載入中...</div>
</div>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxjX9Mxs_wRfJQXi6yDNCdD6TNnJOKFBDRxM6PcQ8iYtntXBa-g2r9LoZSCfVhHqV2k/exec';
let allData = null;

function parseDates(session) {
  if (!session) return [];
  // 轉換特殊粗體數字 𝟬-𝟵 → 0-9
  let text = String(session);
  const boldMap = { '𝟬':'0','𝟭':'1','𝟮':'2','𝟯':'3','𝟰':'4','𝟱':'5','𝟲':'6','𝟳':'7','𝟴':'8','𝟵':'9' };
  text = text.replace(/[\u{1D7EC}-\u{1D7F5}]/gu, c => boldMap[c] || c);
  text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

  const matches = text.match(/\b\d{1,2}\/\d{1,2}\b/g);
  if (!matches || matches.length === 0) return [];
  const [m1, d1] = matches[0].split('/').map(Number);
  let m2, d2;
  if (matches.length >= 2) {
    [m2, d2] = matches[matches.length - 1].split('/').map(Number);
  } else { m2 = m1; d2 = d1 + 4; }
  const dates = [];
  const cursor = new Date(2026, m1 - 1, d1);
  const end = new Date(2026, m2 - 1, d2);
  while (cursor <= end && dates.length < 14) {
    dates.push((cursor.getMonth() + 1) + '/' + cursor.getDate());
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}

function getLocation(campName, session) {
  const text = (campName + ' ' + (session || '')).toLowerCase();
  if (text.includes('北區')) return '北區';
  if (text.includes('永康')) return '永康';
  return '';
}

function paymentBadge(status) {
  const s = (status || '').trim();
  if (!s) return '<span class="payment payment-pending">⏳ 未確認</span>';
  if (/(已|完|OK|ok|是|付)/.test(s)) return '<span class="payment payment-paid">✅ 已付款</span>';
  if (/(未|待|否)/.test(s)) return '<span class="payment payment-unpaid">❌ 未付款</span>';
  return '<span class="payment payment-pending">⏳ ' + s + '</span>';
}

function countAlerts(students) {
  return students.filter(s => (s.allergy && s.allergy !== '無') || (s.health && s.health !== '無' && s.health !== '良好')).length;
}

function countPayment(students) {
  let paid = 0, unpaid = 0;
  students.forEach(s => {
    const p = (s.payment || '').trim();
    if (/(已|完|OK|ok|是|付)/.test(p)) paid++;
    else unpaid++;
  });
  return { paid, unpaid };
}

function render(data) {
  if (!data.camps || data.camps.length === 0) {
    document.getElementById('content').innerHTML = '<div class="loading">尚無報名資料</div>';
    return;
  }

  // 統計列
  const totalStudents = data.camps.reduce((sum, c) => sum + c.count, 0);
  let totalPaid = 0, totalUnpaid = 0, totalAlerts = 0;
  data.camps.forEach(c => {
    const pay = countPayment(c.students);
    totalPaid += pay.paid;
    totalUnpaid += pay.unpaid;
    totalAlerts += countAlerts(c.students);
  });

  const stats = document.getElementById('stats');
  stats.style.display = 'grid';
  stats.innerHTML = `
    <div class="stat"><div class="stat-num">${data.camps.length}</div><div class="stat-label">營隊數</div></div>
    <div class="stat"><div class="stat-num">${totalStudents}</div><div class="stat-label">總人數</div></div>
    <div class="stat"><div class="stat-num" style="color:#2E7D32">${totalPaid}</div><div class="stat-label">已付款</div></div>
    <div class="stat"><div class="stat-num" style="color:#C93A2A">${totalUnpaid}</div><div class="stat-label">未付款/未確認</div></div>
    <div class="stat"><div class="stat-num" style="color:#C93A2A">${totalAlerts}</div><div class="stat-label">💊 特殊照護</div></div>
  `;

  // 營隊卡片格
  let html = '<div class="camps-grid">';
  data.camps.forEach((camp, idx) => {
    const alerts = countAlerts(camp.students);
    const pay = countPayment(camp.students);
    const sessions = new Set(camp.students.map(s => s.session || '(未指定)'));

    html += `<div class="camp-card" onclick="openCamp(${idx})">
      <div class="camp-card-head">
        <div class="camp-name">${camp.name}</div>
        <div class="camp-count-badge">👥 ${camp.count}</div>
      </div>
      <div class="camp-payment-line">
        ${pay.paid > 0 ? `<span class="badge-mini" style="background:#E8F5E9;color:#2E7D32">✅ ${pay.paid}</span>` : ''}
        ${pay.unpaid > 0 ? `<span class="badge-mini" style="background:#FFF3E0;color:#E65100">⏳ ${pay.unpaid}</span>` : ''}
        ${sessions.size > 1 ? `<span class="badge-mini" style="background:#E3F2FD;color:#1565C0">📅 ${sessions.size} 梯次</span>` : ''}
      </div>
      ${alerts > 0 ? `<div class="camp-alerts">💊 ${alerts} 位需特殊照護</div>` : ''}
    </div>`;
  });
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function openCamp(idx) {
  const camp = allData.camps[idx];
  document.getElementById('modalTitle').textContent = camp.name + ' （' + camp.count + ' 人）';

  // 依梯次分組
  const sessionMap = {};
  camp.students.forEach(s => {
    const key = s.session || '(未指定梯次)';
    if (!sessionMap[key]) sessionMap[key] = [];
    sessionMap[key].push(s);
  });

  // 找全部學員（跨營隊查兄弟姊妹）
  const allStudents = [];
  allData.camps.forEach(c => c.students.forEach(s => allStudents.push(s)));

  let body = '';
  Object.keys(sessionMap).forEach(session => {
    const students = sessionMap[session];
    body += `<div class="session-section">
      <div class="session-title">
        <span>📅 ${session}</span>
        <span class="session-count">${students.length} 人</span>
      </div>`;

    students.forEach((s, i) => {
      // 兄弟姊妹
      const siblings = allStudents.filter(x =>
        x.parentPhone && s.parentPhone && x.parentPhone === s.parentPhone && x.name !== s.name
      );
      const siblingNames = [...new Set(siblings.map(x => x.name))];

      const alerts = [];
      if (s.allergy && s.allergy !== '無') alerts.push('⚠️ 過敏/用藥：' + s.allergy);
      if (s.health && s.health !== '無' && s.health !== '良好') alerts.push('🏥 健康：' + s.health);

      body += `<div class="student-row">
        <div class="student-num">${i + 1}</div>
        <div>
          <div class="student-name">
            ${s.name}
            ${s.gender ? `<small>${s.gender}</small>` : ''}
            ${siblingNames.length > 0 ? `<span class="sibling-tag">👨‍👩‍👧 ${siblingNames.join('、')}</span>` : ''}
          </div>
          <div class="student-detail">
            ${s.parentName ? `👤 ${s.parentName}` : ''}
            ${s.parentPhone ? ` ｜ 📱 ${s.parentPhone}` : ''}
            ${s.diet ? ` ｜ 🍽️ ${s.diet}` : ''}
            ${s.lineId ? ` ｜ LINE: ${s.lineId}` : ''}
          </div>
          ${alerts.length > 0 ? `<div class="alert-box">${alerts.map(a => '<div>' + a + '</div>').join('')}</div>` : ''}
          ${s.note ? `<div class="note-box">📝 ${s.note}</div>` : ''}
        </div>
        <div>${paymentBadge(s.payment)}</div>
      </div>`;
    });

    body += `<button class="print-btn" data-camp="${encodeURIComponent(camp.name)}" data-session="${encodeURIComponent(session)}" data-students='${encodeURIComponent(JSON.stringify(students.map(s => ({n:s.name, g:s.gender, a:s.allergy}))))}' onclick="printFromBtn(this)">🖨️ 列印簽到單（${students.length} 人，一頁完成）</button>
    </div>`;
  });

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('show');
  }
}

function printFromBtn(btn) {
  const camp = decodeURIComponent(btn.dataset.camp);
  const session = decodeURIComponent(btn.dataset.session);
  const students = JSON.parse(decodeURIComponent(btn.dataset.students));
  printRollCall(camp, session, students);
}

function printRollCall(campName, session, students) {
  const dates = parseDates(session);
  const n = students.length;
  const rowHeight = n <= 12 ? 42 : n <= 20 ? 32 : n <= 28 ? 24 : n <= 35 ? 20 : 16;
  const fontSize = n <= 15 ? 14 : n <= 25 ? 13 : n <= 35 ? 12 : 11;

  // 動態計算欄位寬度百分比（橫式 A4）
  const dateCount = dates.length > 0 ? dates.length : 1;
  const nameWidth = 22;
  const noteWidth = 16;
  const numWidth = 5;
  const dateWidth = ((100 - nameWidth - noteWidth - numWidth) / dateCount).toFixed(2);

  let rows = '';
  students.forEach((s, i) => {
    rows += `<tr>
      <td class="num">${i + 1}</td>
      <td class="name">${s.n}${s.g ? ' ('+s.g+')' : ''}</td>
      ${(dates.length > 0 ? dates : ['']).map(() => '<td class="check">☐</td>').join('')}
      <td class="note">${s.a && s.a !== '無' ? '⚠️ ' + s.a : ''}</td>
    </tr>`;
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${campName} - 簽到單</title><style>
    @page { size: A4 landscape; margin: 8mm; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 10px; font-family: 'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif; color: #000; }
    h1 { text-align: center; font-size: 18pt; margin: 0 0 6px; font-weight: 900; color: #000; }
    .info { text-align: center; color: #333; margin-bottom: 10px; font-size: 12pt; }
    table { width: 100%; border-collapse: collapse; }
    tr { page-break-inside: avoid; }
    th, td { border: 1.5px solid #000; padding: 4px 6px; text-align: center; font-size: ${fontSize}pt; height: ${rowHeight}px; vertical-align: middle; word-wrap: break-word; }
    th { background: #FFF3E0; font-weight: 900; color: #000; }
    td.num { color: #555; }
    td.name { text-align: left; padding-left: 10px; font-weight: 700; color: #000; }
    td.note { text-align: left; padding-left: 8px; font-size: ${fontSize-1}pt; color: #C93A2A; }
    td.check { color: #aaa; font-size: ${fontSize + 4}pt; font-weight: 400; }
    @media print {
      body { padding: 6px; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style></head><body>
  <h1>${campName}</h1>
  <div class="info">${session}｜共 ${n} 位學員</div>
  <table>
    <tr>
      <th style="width:${numWidth}%">No.</th>
      <th style="width:${nameWidth}%">姓名</th>
      ${(dates.length > 0 ? dates : ['簽到']).map(d => `<th style="width:${dateWidth}%">${d}</th>`).join('')}
      <th style="width:${noteWidth}%">備註</th>
    </tr>
    ${rows}
  </table>
  </body></html>`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  w.addEventListener('load', () => {
    setTimeout(() => {
      w.print();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, 500);
  });
}

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading">載入中...</div>';
  try {
    const res = await fetch(API + '?action=teacher');
    const data = await res.json();
    if (data.success) {
      allData = data;
      render(data);
    } else {
      document.getElementById('content').innerHTML = '<div class="loading">載入失敗</div>';
    }
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading" style="color:#C93A2A">載入失敗：' + e.message + '</div>';
  }
}

loadData();
</script>
</body></html>
