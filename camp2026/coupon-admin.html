<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>優惠券核對系統｜管理員</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #f5f5f5; color: #333;
      min-height: 100vh; padding: 24px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 {
      font-size: 1.3rem; font-weight: 900; color: #F5941E;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }

    .card {
      background: white; border-radius: 16px; padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px;
    }
    .card-title { font-size: 0.82rem; font-weight: 900; color: #aaa; letter-spacing: 1px; margin-bottom: 14px; }

    .input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .input-row input {
      flex: 1; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #eee; font-size: 1rem; font-family: inherit;
      font-weight: 700; outline: none;
    }
    .input-row input:focus { border-color: #F5941E; }
    .verify-btn {
      padding: 12px 24px; border-radius: 10px;
      background: #F5941E; color: white; font-weight: 900;
      font-size: 0.95rem; border: none; cursor: pointer;
      font-family: inherit; white-space: nowrap;
    }
    .verify-btn:hover { background: #E07A08; }

    .result-area { display: none; }
    .result-area.show { display: block; }

    .status-badge {
      display: inline-block; padding: 6px 16px; border-radius: 50px;
      font-size: 0.85rem; font-weight: 900; margin-bottom: 12px;
    }
    .status-valid { background: #E8F5E9; color: #2E7D32; }
    .status-invalid { background: #FFEBEE; color: #C62828; }

    .info-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; margin-bottom: 16px; }
    .info-label { font-size: 0.82rem; color: #aaa; font-weight: 700; }
    .info-value { font-size: 0.95rem; font-weight: 700; color: #333; }

    .camp-select {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #eee; font-size: 0.95rem; font-family: inherit;
      font-weight: 700; margin-bottom: 12px; outline: none;
    }
    .camp-select:focus { border-color: #F5941E; }

    .price-result {
      background: #FFF8F0; border-radius: 12px; padding: 16px;
      border: 2px solid rgba(245,148,30,0.2);
    }
    .price-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.92rem; }
    .price-row.total {
      font-size: 1.2rem; font-weight: 900; color: #C93A2A;
      border-top: 2px solid #eee; padding-top: 10px; margin-top: 10px;
    }
    .price-label { color: #888; }
    .price-value { font-weight: 700; }
    .price-value.strike { text-decoration: line-through; color: #ccc; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .stat-box { text-align: center; }
    .stat-num { font-size: 1.5rem; font-weight: 900; }
    .stat-label { font-size: 0.72rem; color: #aaa; font-weight: 700; }
    .stat-green { color: #2E7D32; }
    .stat-orange { color: #F5941E; }
    .stat-blue { color: #1565C0; }
    .stat-red { color: #C62828; }

    .camp-check {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px; margin-bottom: 6px;
      border: 1.5px solid #eee; cursor: pointer; transition: 0.2s;
    }
    .camp-check:hover { border-color: #F5941E; background: #FFF8F0; }
    .camp-check input { width: 18px; height: 18px; accent-color: #F5941E; }
    .camp-check-name { font-size: 0.88rem; font-weight: 700; flex: 1; }
    .camp-check-price { font-size: 0.82rem; color: #888; font-weight: 600; }
    .refresh-btn {
      display: block; width: 100%; padding: 10px; margin-top: 12px;
      background: none; border: 1.5px solid #eee; border-radius: 10px;
      font-size: 0.82rem; font-weight: 700; color: #aaa;
      cursor: pointer; font-family: inherit;
    }
    .refresh-btn:hover { border-color: #F5941E; color: #F5941E; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎟️ 優惠券核對系統</h1>
  <div class="subtitle">管理員專用 — 核對優惠碼 × 計算折扣金額</div>

  <!-- 即時統計 -->
  <div class="card">
    <div class="card-title">📊 即時統計</div>
    <div class="stats" id="stats">
      <div class="stat-box"><div class="stat-num stat-green" id="statAvail">-</div><div class="stat-label">可領取</div></div>
      <div class="stat-box"><div class="stat-num stat-orange" id="statClaimed">-</div><div class="stat-label">已領取</div></div>
      <div class="stat-box"><div class="stat-num stat-blue" id="statUsed">-</div><div class="stat-label">已使用</div></div>
      <div class="stat-box"><div class="stat-num stat-red" id="statExpired">-</div><div class="stat-label">已過期</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:0">
      <button class="refresh-btn" onclick="loadStats()" style="flex:1;margin-top:0">↻ 重新整理</button>
      <button class="refresh-btn" onclick="addMore()" style="flex:1;margin-top:0;border-color:#F5941E;color:#F5941E">＋ 加開優惠券</button>
    </div>
  </div>

  <!-- 家長查詢（主功能）-->
  <div class="card">
    <div class="card-title">📱 輸入家長電話，一鍵查全部</div>
    <div class="input-row">
      <input type="tel" id="phoneLookup" placeholder="輸入家長手機號碼" oninput="this.value=this.value.replace(/[^0-9]/g,'')" maxlength="10" />
      <button class="verify-btn" onclick="lookupPhone()">查詢</button>
    </div>
    <div id="lookupResult"></div>
  </div>

  <!-- 優惠碼核對（備用）-->
  <div class="card">
    <div class="card-title">🔍 單獨核對優惠碼</div>
    <div class="input-row">
      <input type="text" id="codeInput" placeholder="優惠碼（例如 BP-7A3X）" style="flex:1.2" />
      <input type="tel" id="phoneCheck" placeholder="家長手機" style="flex:0.8" />
      <button class="verify-btn" onclick="verify()">核對</button>
    </div>
    <div class="result-area" id="resultArea">
      <div id="statusBadge"></div>
      <div class="info-grid" id="infoGrid"></div>
      <div id="priceCalc" style="display:none"></div>
    </div>
  </div>

  <!-- 帳單計算器 -->
  <div class="card">
    <div class="card-title">💰 帳單計算器（可獨立使用）</div>
    <div style="font-size:0.82rem;color:#aaa;margin-bottom:14px">勾選家長報名的營隊，自動計算應付金額</div>

    <div id="campCheckboxes" style="margin-bottom:16px"></div>

    <div style="margin-bottom:12px">
      <div style="font-size:0.82rem;font-weight:700;color:#666;margin-bottom:6px">有優惠碼？</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:0.9rem;font-weight:700;cursor:pointer">
        <input type="checkbox" id="hasDiscount" onchange="calcBill()" style="width:18px;height:18px;accent-color:#F5941E" />
        使用 95 折優惠券
      </label>
    </div>

    <div style="margin-bottom:12px">
      <div style="font-size:0.82rem;font-weight:700;color:#666;margin-bottom:6px">價格方案</div>
      <div style="display:flex;gap:8px">
        <label style="display:flex;align-items:center;gap:4px;font-size:0.85rem;font-weight:700;cursor:pointer">
          <input type="radio" name="priceType" value="earlybird" checked onchange="calcBill()" /> 早鳥價
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:0.85rem;font-weight:700;cursor:pointer">
          <input type="radio" name="priceType" value="duo" onchange="calcBill()" /> 兩人同行
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:0.85rem;font-weight:700;cursor:pointer">
          <input type="radio" name="priceType" value="original" onchange="calcBill()" /> 原價
        </label>
      </div>
    </div>

    <div class="price-result" id="billResult" style="display:none"></div>
  </div>
</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbysKHCkZ68u6VTgru6B9O2QY3udh4zPfqT8u9iSIWmkngfHnjU1QXHWlobkL_XG_Vh8/exec';

  // 營隊費用表（早鳥價+折扣價）
  const camps = [
    { name: '猴囝仔露營趣｜動物方城市', earlybird: 6999, discounted: 6650, original: 7500, duo: null },
    { name: 'MAKER自造營｜我是造船大師', earlybird: 7500, discounted: 7125, original: 8800, duo: 7400 },
    { name: '全新打造！水上裝置實驗室', earlybird: 7500, discounted: 7125, original: 8800, duo: 7400 },
    { name: '空中競技計畫｜無人機足球營隊', earlybird: 7999, discounted: 7600, original: 9500, duo: 7800 },
    { name: 'Game Lab｜遊戲設計師養成營', earlybird: 7500, discounted: 7125, original: 8500, duo: 6800 },
    { name: 'ROBLOX x SPIKE機器人 實境戰場計畫', earlybird: 6999, discounted: 6650, original: 8500, duo: 6800 },
    { name: 'HELLO MAKER 廢材機器人自造營', earlybird: 7500, discounted: 7125, original: 8800, duo: 7400 },
    { name: 'LEGO Ideas｜玩具設計總監計畫', earlybird: 6999, discounted: 6650, original: 8500, duo: 6800 },
    { name: '飛行航空科學營｜萊特兄弟計劃', earlybird: 7999, discounted: 7600, original: null, duo: 7800 },
    { name: '科學大師營｜大型科學水火箭', earlybird: 4800, discounted: 4560, original: null, duo: 4700 },
    { name: '3D 列印工作坊', earlybird: 4800, discounted: 4560, original: null, duo: 4700 },
  ];

  // 初始化營隊勾選清單
  const checkboxWrap = document.getElementById('campCheckboxes');
  camps.forEach((c, i) => {
    const label = document.createElement('label');
    label.className = 'camp-check';
    label.innerHTML = `
      <input type="checkbox" value="${i}" onchange="calcBill()" />
      <span class="camp-check-name">${c.name}</span>
      <span class="camp-check-price">$${c.earlybird.toLocaleString()}</span>
    `;
    checkboxWrap.appendChild(label);
  });

  // 載入統計
  async function loadStats() {
    try {
      const res = await fetch(API + '?action=status');
      const data = await res.json();
      document.getElementById('statAvail').textContent = data.available;
      document.getElementById('statClaimed').textContent = data.claimed;
      document.getElementById('statUsed').textContent = data.used;
      document.getElementById('statExpired').textContent = data.expired;
    } catch(e) {
      console.error(e);
    }
  }

  // 核對優惠碼
  async function verify() {
    const code = document.getElementById('codeInput').value.trim().toUpperCase();
    if (!code) { alert('請輸入優惠碼'); return; }

    const resultArea = document.getElementById('resultArea');
    const statusBadge = document.getElementById('statusBadge');
    const infoGrid = document.getElementById('infoGrid');
    const priceCalc = document.getElementById('priceCalc');

    resultArea.classList.add('show');
    statusBadge.innerHTML = '<span class="status-badge" style="background:#FFF3E0;color:#E65100;">查詢中...</span>';
    infoGrid.innerHTML = '';
    priceCalc.style.display = 'none';

    try {
      // 先查詢驗證狀態（不標記為使用）
      const res = await fetch(API + '?action=verify&code=' + encodeURIComponent(code));
      const data = await res.json();

      if (data.valid) {
        statusBadge.innerHTML = '<span class="status-badge status-valid">✅ 優惠碼有效</span>';
        priceCalc.style.display = 'block';
      } else {
        statusBadge.innerHTML = '<span class="status-badge status-invalid">' + (data.status || '❌ 無效') + '</span>';
        priceCalc.style.display = 'none';
      }

      const inputPhone = document.getElementById('phoneCheck').value.replace(/[-\s]/g, '').trim();
      const boundPhone = (data.phone || '').replace(/[-\s]/g, '').trim();
      let phoneMatch = '';

      if (data.valid && inputPhone && boundPhone) {
        if (inputPhone === boundPhone) {
          phoneMatch = '<span style="color:#2E7D32;font-weight:900">✅ 手機吻合</span>';
        } else {
          phoneMatch = '<span style="color:#C93A2A;font-weight:900">❌ 手機不吻合！可能是盜用</span>';
        }
      }

      infoGrid.innerHTML = `
        <div class="info-label">優惠碼</div><div class="info-value">${code}</div>
        <div class="info-label">狀態</div><div class="info-value">${data.status || '未知'}</div>
        <div class="info-label">綁定手機</div><div class="info-value">${data.phone || '—'} ${phoneMatch}</div>
        ${data.claimedAt ? `<div class="info-label">領取時間</div><div class="info-value">${data.claimedAt}</div>` : ''}
        ${data.expiresAt ? `<div class="info-label">到期時間</div><div class="info-value">${data.expiresAt}</div>` : ''}
        <div class="info-label">折扣</div><div class="info-value">${data.valid ? '95 折' : '—'}</div>
      `;

      if (data.valid && inputPhone && inputPhone === boundPhone) {
        infoGrid.innerHTML += `
          <div class="info-label"></div>
          <div class="info-value" style="margin-top:8px;padding:12px;background:#E8F5E9;border-radius:10px;color:#2E7D32;font-weight:900;text-align:center">
            ✅ 驗證通過！請給予 95 折優惠
          </div>
        `;
      }

    } catch(e) {
      statusBadge.innerHTML = '<span class="status-badge status-invalid">❌ 查詢失敗</span>';
    }
  }

  // 計算帳單
  function calcBill() {
    const checks = document.querySelectorAll('#campCheckboxes input:checked');
    const billResult = document.getElementById('billResult');
    const hasDiscount = document.getElementById('hasDiscount').checked;
    const priceType = document.querySelector('input[name="priceType"]:checked').value;

    if (checks.length === 0) { billResult.style.display = 'none'; return; }

    // 更新勾選清單顯示的價格
    document.querySelectorAll('#campCheckboxes .camp-check-price').forEach((el, i) => {
      const c = camps[i];
      let p;
      if (priceType === 'duo' && c.duo) p = c.duo;
      else if (priceType === 'original' && c.original) p = c.original;
      else p = c.earlybird;
      el.textContent = '$' + p.toLocaleString();
    });

    let html = '';
    let subtotal = 0;

    checks.forEach(cb => {
      const camp = camps[cb.value];
      let price;
      if (priceType === 'duo' && camp.duo) price = camp.duo;
      else if (priceType === 'original' && camp.original) price = camp.original;
      else price = camp.earlybird;

      subtotal += price;
      html += `<div class="price-row">
        <span class="price-label">${camp.name}</span>
        <span class="price-value">$${price.toLocaleString()}</span>
      </div>`;
    });

    html += `<div class="price-row" style="border-top:1px solid #eee;padding-top:8px;margin-top:8px">
      <span class="price-label">小計（${checks.length} 個營隊）</span>
      <span class="price-value">$${subtotal.toLocaleString()}</span>
    </div>`;

    if (hasDiscount) {
      // 用每個營隊的折扣價（已整數）計算
      let discounted = 0;
      checks.forEach(cb => {
        const camp = camps[cb.value];
        discounted += camp.discounted || Math.round(camp.earlybird * 0.95);
      });
      const saved = subtotal - discounted;
      html += `<div class="price-row">
        <span class="price-label">95 折優惠（每項折扣）</span>
        <span class="price-value">-$${saved.toLocaleString()}</span>
      </div>`;
      html += `<div class="price-row total">
        <span>💰 應付總額</span>
        <span>$${discounted.toLocaleString()}</span>
      </div>`;
      html += `<div class="price-row">
        <span class="price-label">共省下</span>
        <span class="price-value" style="color:#2E7D32">$${saved.toLocaleString()}</span>
      </div>`;
    } else {
      html += `<div class="price-row total">
        <span>💰 應付總額</span>
        <span>$${subtotal.toLocaleString()}</span>
      </div>`;
    }

    billResult.innerHTML = html;
    billResult.style.display = 'block';
  }

  // 複製家長訊息
  function copyParentMsg() {
    const ta = document.getElementById('parentMsgText');
    if (!ta) return;
    navigator.clipboard.writeText(ta.value).then(() => {
      alert('✅ 已複製！可以直接貼到 LINE 傳給家長');
    }).catch(() => {
      ta.style.position = 'static';
      ta.select();
      document.execCommand('copy');
      alert('✅ 已複製！');
    });
  }

  // 加開優惠券
  async function addMore() {
    const count = prompt('要加開幾張優惠券？（1～100）');
    if (!count) return;
    const num = parseInt(count);
    if (!num || num < 1 || num > 100) { alert('請輸入 1～100 的數字'); return; }
    if (!confirm('確定要加開 ' + num + ' 張優惠券？')) return;

    try {
      const res = await fetch(API + '?action=addmore&count=' + num + '&key=' + ADMIN_PASS);
      const data = await res.json();
      alert(data.message || data.error);
      loadStats();
    } catch(e) {
      alert('操作失敗，請再試一次');
    }
  }

  // 電話查詢
  async function lookupPhone() {
    const phone = document.getElementById('phoneLookup').value.trim();
    const resultDiv = document.getElementById('lookupResult');
    if (!phone || phone.length < 9) { alert('請輸入正確的手機號碼'); return; }

    resultDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa">查詢中...</div>';

    try {
      const res = await fetch(API + '?action=lookup&phone=' + encodeURIComponent(phone));
      const data = await res.json();

      if (!data.success) {
        resultDiv.innerHTML = `<div style="padding:16px;color:#C93A2A;font-weight:700">${data.error}</div>`;
        return;
      }

      let html = '';

      // 優惠券狀態
      if (data.coupon) {
        const c = data.coupon;
        const statusColor = c.status === '已領取' ? '#2E7D32' : c.status === '已過期' ? '#C93A2A' : '#1565C0';
        html += `<div style="background:#f9f9f9;border-radius:12px;padding:14px 16px;margin:12px 0;border-left:4px solid ${statusColor}">
          <div style="font-size:.82rem;color:#aaa;font-weight:700;margin-bottom:6px">🎟️ 優惠券</div>
          <div style="font-size:1rem;font-weight:900">優惠碼：<span style="color:${statusColor}">${c.code}</span>（${c.status}）</div>
          ${c.claimedAt ? `<div style="font-size:.78rem;color:#aaa;margin-top:4px">領取：${c.claimedAt}｜到期：${c.expiresAt}</div>` : ''}
        </div>`;
      } else {
        html += `<div style="background:#f9f9f9;border-radius:12px;padding:14px 16px;margin:12px 0;border-left:4px solid #aaa">
          <div style="font-size:.92rem;color:#888">🎟️ 此號碼未領取優惠券</div>
        </div>`;
      }

      // 報名紀錄
      if (data.registrations.length === 0) {
        html += `<div style="text-align:center;padding:24px;color:#aaa">📋 查無此號碼的報名紀錄</div>`;
      } else {
        html += `<div style="font-size:.82rem;font-weight:900;color:#aaa;letter-spacing:1px;margin:16px 0 8px">📋 報名紀錄（${data.campCount} 個營隊）</div>`;

        data.registrations.forEach(r => {
          const discounted = r.hasCoupon;
          html += `<div style="background:white;border:1.5px solid ${discounted ? '#F5941E' : '#eee'};border-radius:12px;padding:14px 16px;margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:.95rem;font-weight:900;color:#333">${r.camp}</div>
                ${r.childName ? `<div style="font-size:.78rem;color:#888;margin-top:2px">👦 ${r.childName} ${r.session ? '｜' + r.session : ''}</div>` : ''}
              </div>
              <div style="text-align:right">
                ${discounted
                  ? `<div style="font-size:.75rem;color:#aaa;text-decoration:line-through">$${r.basePrice.toLocaleString()}</div>
                     <div style="font-size:1.1rem;font-weight:900;color:#2E7D32">$${r.finalPrice.toLocaleString()}</div>`
                  : `<div style="font-size:1.1rem;font-weight:900;color:#333">$${r.basePrice.toLocaleString()}</div>`
                }
              </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;font-size:.72rem">
              <span style="background:#f0f0f0;color:#666;padding:2px 8px;border-radius:50px;font-weight:700">📋 ${r.priceType}</span>
              ${r.couponCode !== '無'
                ? `<span style="background:${discounted ? '#E8F5E9' : '#FFEBEE'};color:${discounted ? '#2E7D32' : '#C93A2A'};padding:2px 8px;border-radius:50px;font-weight:700">🎟️ ${r.couponCode} ${discounted ? '✅' : '❌'}</span>`
                : `<span style="background:#f5f5f5;color:#aaa;padding:2px 8px;border-radius:50px;font-weight:700">無優惠碼</span>`
              }
              ${r.isDuo ? `<span style="background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:50px;font-weight:700">👥 兩人同行</span>` : ''}
            </div>
            ${r.note ? `<div style="font-size:.72rem;color:#888;margin-top:4px;padding-left:4px">📝 ${r.note}</div>` : ''}
          </div>`;
        });

        // 總計
        html += `<div style="background:linear-gradient(135deg,#FFF8F0,#FFF3E0);border-radius:12px;padding:16px;margin-top:12px;border:2px solid rgba(245,148,30,0.2)">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="color:#888;font-size:.88rem">小計（${data.campCount} 個營隊）</span>
            <span style="font-weight:700;${data.totalSaved > 0 ? 'text-decoration:line-through;color:#aaa' : 'color:#333'}">$${data.totalBase.toLocaleString()}</span>
          </div>
          ${data.totalSaved > 0 ? `
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="color:#2E7D32;font-size:.88rem;font-weight:700">95 折優惠</span>
              <span style="color:#2E7D32;font-weight:700">-$${data.totalSaved.toLocaleString()}</span>
            </div>
          ` : ''}
          <div style="display:flex;justify-content:space-between;border-top:2px solid rgba(0,0,0,.06);padding-top:8px;margin-top:8px">
            <span style="font-size:1.1rem;font-weight:900">💰 應付總額</span>
            <span style="font-size:1.3rem;font-weight:900;color:#C93A2A">$${data.totalFinal.toLocaleString()}</span>
          </div>
        </div>`;

        // 產生可複製的家長訊息
        const hasAnyDiscount = data.totalSaved > 0;
        const childName = data.registrations[0]?.childName || '';
        let msg = hasAnyDiscount
          ? '媽咪您好！有確認收到您們報名表單+使用優惠折扣碼✅\n\n'
          : '媽咪您好！有確認收到您們報名表單✅\n\n';
        if (childName) msg += '【寶貝姓名：' + childName + '】\n';
        data.registrations.forEach(r => {
          msg += '\n💟' + r.camp;
          if (r.session) msg += '\n' + r.session;
          msg += (r.hasCoupon || r.isDuo) ? '\n費用經折扣後為：$' + r.finalPrice.toLocaleString() : '\n費用為：$' + r.finalPrice.toLocaleString();
          msg += '\n';
        });
        msg += '\n營隊費用總計：$' + data.totalFinal.toLocaleString();

        html += `
          <button onclick="copyParentMsg()" style="display:block;width:100%;padding:14px;margin-top:14px;border-radius:50px;background:#06C755;color:white;font-weight:900;font-size:1rem;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(6,199,85,0.3)">
            📋 複製家長訊息（可直接貼 LINE）
          </button>
          <textarea id="parentMsgText" style="position:absolute;left:-9999px;top:-9999px">${msg}</textarea>
          <details style="margin-top:10px"><summary style="font-size:.82rem;color:#888;cursor:pointer;font-weight:700">👁️ 預覽訊息</summary>
            <pre style="background:#f9f9f9;border-radius:10px;padding:12px;font-size:.82rem;white-space:pre-wrap;color:#333;margin-top:8px;font-family:inherit;line-height:1.7">${msg}</pre>
          </details>`;
      }

      resultDiv.innerHTML = html;
    } catch(e) {
      resultDiv.innerHTML = '<div style="padding:16px;color:#C93A2A;font-weight:700">❌ 查詢失敗，請再試一次</div>';
    }
  }

  // Enter 鍵觸發查詢
  document.getElementById('phoneLookup').addEventListener('keydown', e => {
    if (e.key === 'Enter') lookupPhone();
  });

  // 結案優惠碼
  async function closeCoupon(code) {
    if (!confirm('確定要結案 ' + code + '？結案後此優惠碼將無法再使用。')) return;
    try {
      const res = await fetch(API + '?action=close&code=' + encodeURIComponent(code));
      const data = await res.json();
      alert(data.status);
      verify(); // 重新查詢
      loadStats();
    } catch(e) {
      alert('操作失敗，請再試一次');
    }
  }

  // Enter 鍵觸發核對
  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') verify();
  });

  // 密碼鎖
  const ADMIN_PASS = 'bp2026admin';
  function checkAuth() {
    if (sessionStorage.getItem('bp_admin_auth') === 'ok') return true;
    const pwd = prompt('請輸入管理員密碼：');
    if (pwd === ADMIN_PASS) {
      sessionStorage.setItem('bp_admin_auth', 'ok');
      return true;
    } else {
      document.body.innerHTML = '<div style="text-align:center;padding:100px 20px;font-size:1.2rem;color:#C93A2A;font-weight:900">⛔ 密碼錯誤，請重新整理再試</div>';
      return false;
    }
  }

  // 初始化
  if (checkAuth()) loadStats();
</script>
</body>
</html>
