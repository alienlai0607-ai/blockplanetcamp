<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賽事區 ‧ 布拉克星球寶可夢卡牌大賽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <main class="wrap" style="padding-top:24px;padding-bottom:40px">
    <div class="toolbar">
      <div>
        <h1 class="section-title" id="evtName"><span class="bp-icon i-battle"></span>賽事區</h1>
        <p class="section-sub" id="evtStatus">即時賽況看板</p>
      </div>
      <span class="spacer"></span>
      <a class="btn ghost sm" href="console.html"><span class="bp-icon i-judge"></span>裁判控制台</a>
      <button class="btn sm ghost" id="refreshBtn">↻ 重新整理</button>
    </div>

    <div class="flow-steps" id="flowSteps"></div>
    <div id="content"></div>
  </main>

  <div class="confetti" id="confetti" style="display:none"></div>

  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/tournament.js"></script>
  <script src="../assets/js/battle-view.js"></script>
  <script>
    renderHeader('battle');
    renderFooter();
    BattleView.render();
    document.getElementById('refreshBtn').addEventListener('click', () => BattleView.render());
    // 跨分頁同步：控制台改了資料，這頁自動更新
    window.addEventListener('storage', e => { if (e.key === 'bp_tournament') BattleView.render(); });
  </script>
</body>
</html>
