<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到你的課程 ✨ | 布拉克星球</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #F5941E;
      --orange-dark: #E07A08;
      --blue: #4B9CD3;
      --green: #5BAD5B;
      --yellow: #F5D021;
      --black: #2C2C2C;
      --bg: #FFF8F0;
      --text: #333;
      --radius: 20px;
    }

    html, body {
      font-family: 'Noto Sans TC', 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 頂部導覽 ── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px;
      background: rgba(255,248,240,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid rgba(245,148,30,0.2);
    }
    .top-bar-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .top-bar-logo img { width: 36px; height: 36px; border-radius: 50%; }
    .top-bar-logo span { font-weight: 900; font-size: 0.95rem; color: var(--black); }
    .top-bar-logo small { display: block; font-size: 0.7rem; color: var(--orange); font-weight: 700; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      color: #888; font-size: 0.85rem; font-weight: 700;
      text-decoration: none; padding: 6px 12px;
      border-radius: 50px; background: rgba(0,0,0,0.05);
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(0,0,0,0.1); }

    /* ── 主要容器 ── */
    .quiz-wrapper {
      min-height: 100svh;
      padding: 96px 20px 48px;
      display: flex; flex-direction: column; align-items: center;
      /* 桌機：垂直置中；手機：從頂部開始（避免 iOS Safari 捲到中間的 bug） */
      justify-content: center;
    }
    @media (max-width: 768px) {
      .quiz-wrapper { justify-content: flex-start; }
    }

    /* ── 進度條 ── */
    .progress-area {
      width: 100%; max-width: 520px;
      margin-bottom: 24px;
    }
    .progress-bar-wrap {
      height: 6px; background: rgba(0,0,0,0.08); border-radius: 99px; overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), #ffb347);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: #aaa; font-weight: 700;
    }

    /* ── 問題卡片 ── */
    .question-card {
      width: 100%; max-width: 520px;
      background: white;
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.10);
      border: 2px solid rgba(245,148,30,0.1);
      animation: cardIn 0.45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes cardOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-24px) scale(0.97); }
    }
    .question-card.leaving { animation: cardOut 0.3s cubic-bezier(.4,0,.2,1) both; }

    .q-emoji { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .q-text {
      font-size: 1.35rem; font-weight: 900; color: var(--black);
      line-height: 1.35; margin-bottom: 8px;
    }
    .q-sub {
      font-size: 0.88rem; color: #888; margin-bottom: 28px; line-height: 1.6;
    }

    /* ── 答案選項 ── */
    .options-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .option-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 18px 12px;
      border: 2.5px solid #f0f0f0; border-radius: 16px;
      background: white; cursor: pointer;
      font-family: inherit; text-align: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    .option-btn:hover {
      border-color: var(--orange);
      background: #FFF8F0;
      transform: translateY(-2px);
    }
    .option-btn:active { transform: scale(0.97); }
    .option-btn.selected {
      border-color: var(--orange);
      background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
    }
    .option-btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(245,148,30,0.08);
      opacity: 0; transition: opacity 0.2s;
      border-radius: inherit;
    }
    .option-btn:hover::after { opacity: 1; }
    .option-emoji { font-size: 1.8rem; line-height: 1; }
    .option-text { font-size: 0.85rem; font-weight: 700; color: var(--black); line-height: 1.35; }

    /* ── 結果頁 ── */
    .result-card {
      width: 100%; max-width: 520px;
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0,0,0,0.14);
      animation: cardIn 0.55s cubic-bezier(.4,0,.2,1) both;
    }
    .result-header {
      padding: 40px 32px 28px;
      text-align: center; position: relative;
    }
    .result-confetti {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .confetti-dot {
      position: absolute; border-radius: 3px;
      animation: confettiFall linear infinite;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(140px) rotate(720deg); opacity: 0; }
    }
    .result-badge {
      display: inline-block;
      padding: 6px 20px; border-radius: 50px;
      font-size: 0.78rem; font-weight: 900; letter-spacing: 2px;
      color: white; margin-bottom: 16px;
    }
    .result-char {
      width: 130px; height: 130px; object-fit: contain;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.18));
      animation: charBounce 3s ease-in-out infinite;
      margin-bottom: 12px;
    }
    @keyframes charBounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .result-announce {
      font-size: 0.9rem; color: #888; font-weight: 700; margin-bottom: 6px;
    }
    .result-level {
      font-size: 2rem; font-weight: 900; color: var(--black); line-height: 1.2;
    }
    .result-age {
      display: inline-block; margin-top: 8px;
      background: #f5f5f5; border-radius: 50px;
      padding: 4px 14px; font-size: 0.78rem; font-weight: 700; color: #888;
    }
    .result-body { padding: 0 32px 32px; }
    .result-desc {
      font-size: 0.95rem; color: #555; line-height: 1.85;
      background: var(--bg); border-radius: 14px;
      padding: 18px 20px; margin-bottom: 24px;
    }
    .result-btns { display: flex; flex-direction: column; gap: 12px; }
    .btn-primary-lg {
      display: block; width: 100%;
      padding: 16px; border-radius: 50px; text-align: center;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white; font-weight: 900; font-size: 1rem;
      text-decoration: none; border: none; cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(245,148,30,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary-lg:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(245,148,30,0.5); }
    .btn-outline-lg {
      display: block; width: 100%;
      padding: 14px; border-radius: 50px; text-align: center;
      background: white; color: var(--orange);
      border: 2.5px solid var(--orange);
      font-weight: 900; font-size: 0.95rem;
      text-decoration: none; cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-outline-lg:hover { background: #FFF3E0; transform: translateY(-2px); }
    .retry-btn {
      display: block; text-align: center;
      margin-top: 16px; color: #bbb;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer; background: none; border: none;
      font-family: inherit;
      transition: color 0.2s;
    }
    .retry-btn:hover { color: var(--orange); }

    /* ── 起始畫面 ── */
    .intro-card {
      width: 100%; max-width: 520px;
      background: white; border-radius: 28px;
      padding: 44px 32px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.10);
      text-align: center;
      animation: cardIn 0.45s cubic-bezier(.4,0,.2,1) both;
    }
    .intro-mascot {
      width: 110px; height: 110px; object-fit: contain;
      animation: charBounce 3s ease-in-out infinite;
      margin-bottom: 20px;
    }
    .intro-title {
      font-size: 1.6rem; font-weight: 900; color: var(--black);
      line-height: 1.3; margin-bottom: 14px;
    }
    .intro-title em { font-style: normal; color: var(--orange); }
    .intro-sub {
      font-size: 0.92rem; color: #666; line-height: 1.8;
      margin-bottom: 32px;
    }
    .intro-tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 32px;
    }
    .intro-tag {
      background: var(--bg); border: 1.5px solid rgba(245,148,30,0.3);
      border-radius: 50px; padding: 5px 14px;
      font-size: 0.8rem; font-weight: 700; color: #888;
    }
    .start-btn {
      display: block; width: 100%;
      padding: 18px; border-radius: 50px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white; font-weight: 900; font-size: 1.05rem;
      border: none; cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 28px rgba(245,148,30,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(245,148,30,0.5); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .quiz-wrapper { padding: 80px 16px 40px; }
      .question-card { padding: 28px 20px; border-radius: 22px; }
      .q-text { font-size: 1.2rem; }
      .options-grid { gap: 10px; }
      .option-btn { padding: 14px 8px; border-radius: 14px; }
      .option-emoji { font-size: 1.6rem; }
      .option-text { font-size: 0.78rem; }
      .result-card { border-radius: 22px; }
      .result-header { padding: 32px 20px 20px; }
      .result-body { padding: 0 20px 24px; }
      .result-char { width: 110px; height: 110px; }
      .result-level { font-size: 1.65rem; }
      .intro-card { padding: 36px 20px; border-radius: 22px; }
    }
  </style>
</head>
<body>

<!-- 頂部導覽 -->
<div class="top-bar">
  <a class="top-bar-logo" href="index.html">
    <img src="assets/可愛的布拉克星球logo.png" alt="布拉克星球" />
    <div>
      <span>布拉克星球</span>
      <small>Block Planet</small>
    </div>
  </a>
  <a class="back-btn" href="index.html">← 回首頁</a>
</div>

<!-- 主體 -->
<div class="quiz-wrapper" id="quizWrapper">
  <!-- 由 JS 動態渲染 -->
</div>

<script>
  // ── 問題資料 ──
  const questions = [
    {
      emoji: '🎂',
      text: '孩子現在幾歲？',
      sub: '我們根據年齡幫你找最合適的起點',
      options: [
        { emoji: '🐣', text: '4～6 歲',      scores: { L1: 4, L2: 1 } },
        { emoji: '🌱', text: '7～9 歲',      scores: { L2: 3, L3: 3 } },
        { emoji: '⚡', text: '10～12 歲',    scores: { L3: 2, L4: 4 } },
        { emoji: '🚀', text: '13 歲以上',   scores: { L4: 1, L5: 5 } },
      ]
    },
    {
      emoji: '🧩',
      text: '目前接觸過什麼課程？',
      sub: '沒有也完全沒關係，每個起點都有最適合的路',
      options: [
        { emoji: '🌟', text: '完全沒有接觸',        scores: { L1: 4, L2: 1 } },
        { emoji: '🧱', text: '玩過樂高或積木',      scores: { L2: 3, L3: 2 } },
        { emoji: '💻', text: '學過程式或機器人課',  scores: { L3: 2, L4: 4 } },
        { emoji: '🏆', text: '有比賽或豐富實作經驗', scores: { L4: 1, L5: 5 } },
      ]
    },
    {
      emoji: '💡',
      text: '孩子最喜歡哪種事？',
      sub: '選最接近的那個，沒有對錯',
      options: [
        { emoji: '🎨', text: '動手做、手工藝',      scores: { L1: 2, L2: 4, L3: 2 } },
        { emoji: '🤖', text: '積木拼裝、機器人',    scores: { L3: 4, L4: 2 } },
        { emoji: '🔢', text: '電腦、程式、邏輯',    scores: { L4: 5, L3: 1 } },
        { emoji: '🥇', text: '挑戰極限、競技比賽',  scores: { L5: 5, L4: 1 } },
      ]
    },
    {
      emoji: '🎯',
      text: '你最希望孩子得到什麼？',
      sub: '這將幫助我們給你最精準的推薦',
      options: [
        { emoji: '😄', text: '探索興趣，快樂玩學',      scores: { L1: 3, L2: 3 } },
        { emoji: '🧠', text: '培養邏輯和動手能力',      scores: { L2: 2, L3: 4 } },
        { emoji: '📈', text: '加強競爭力，準備未來',    scores: { L4: 5 } },
        { emoji: '🌍', text: '站上國際舞台，要拿冠軍！', scores: { L5: 5, L4: 1 } },
      ]
    }
  ];

  // ── 課程資料 ──
  const courses = {
    L1: {
      level: 'LEVEL 1',
      name: '創意積木課',
      age: '適合 4～7 歲',
      color: '#4B9CD3',
      bg: '#4B9CD3',
      headerBg: 'linear-gradient(135deg, #b8d4f0 0%, #4B9CD3 100%)',
      img: 'assets/level-creative-nobg.png',
      desc: '用積木和創意探索世界！每堂課都像在玩，卻在玩中養成空間感、手眼協調和創意表達，是孩子最棒的第一堂課。',
    },
    L2: {
      level: 'LEVEL 2',
      name: '科學手作入門',
      age: '適合 5～8 歲',
      color: '#5BAD5B',
      bg: '#5BAD5B',
      headerBg: 'linear-gradient(135deg, #c8e6c8 0%, #5BAD5B 100%)',
      img: 'assets/level-easy-nobg.png',
      desc: '從手作中發現科學原理！小實驗、簡單機械、趣味工程，每次都有「原來如此！」的驚喜，孩子每週都期待上課。',
    },
    L3: {
      level: 'LEVEL 3',
      name: '科學實驗手作',
      age: '適合 6～12 歲',
      color: '#F5941E',
      bg: '#F5941E',
      headerBg: 'linear-gradient(135deg, #ffe9b5 0%, #F5941E 100%)',
      img: 'assets/level-maker-nobg.png',
      desc: '廢材機器人、科學實驗、工程挑戰——每次都是全新冒險，孩子從不想下課！動手解決問題的能力從這裡開始。',
    },
    L4: {
      level: 'LEVEL 4',
      name: '積木程式課',
      age: '適合 7～11 歲',
      color: '#7B5EA7',
      bg: '#7B5EA7',
      headerBg: 'linear-gradient(135deg, #d4b8e0 0%, #7B5EA7 100%)',
      img: 'assets/level-wedo-nobg.png',
      desc: '用樂高學程式邏輯，讓機器人真的動起來！Milo 機器人帶孩子在遊戲中建立系統化思考，也是競賽路的重要基礎。',
    },
    L5: {
      level: 'LEVEL 5',
      name: '國際競賽班',
      age: '適合 10 歲以上',
      color: '#C93A2A',
      bg: '#0f3460',
      headerBg: 'linear-gradient(135deg, #2a1a4e 0%, #0f3460 100%)',
      img: 'assets/level-spike-nobg.png',
      desc: 'FLL、MARC、FTC 國際機器人競賽。從零開始組裝、寫程式、上賽場。布拉克星球已陪伴學生拿下超過 12 座獎盃！',
    }
  };

  // ── 狀態 ──
  let currentStep = 'intro'; // intro | quiz | result
  let currentQ = 0;
  const scores = { L1: 0, L2: 0, L3: 0, L4: 0, L5: 0 };

  const wrapper = document.getElementById('quizWrapper');

  // ── 渲染起始頁 ──
  function renderIntro() {
    wrapper.innerHTML = `
      <div class="intro-card">
        <img class="intro-mascot" src="assets/level-easy-nobg.png" alt="布拉克星球吉祥物" />
        <h1 class="intro-title">找到孩子<br/>最適合的<em>課程</em></h1>
        <p class="intro-sub">只需要回答 4 個小問題<br/>我們幫你找出最適合孩子現在的起點</p>
        <div class="intro-tags">
          <span class="intro-tag">⏱️ 只要 1 分鐘</span>
          <span class="intro-tag">🎯 精準推薦</span>
          <span class="intro-tag">💯 完全免費</span>
        </div>
        <button class="start-btn" onclick="startQuiz()">開始測驗 →</button>
      </div>
    `;
  }

  // ── 渲染問題 ──
  function renderQuestion() {
    const q = questions[currentQ];
    const pct = (currentQ / questions.length) * 100;
    const qNum = currentQ + 1;

    wrapper.innerHTML = `
      <div class="progress-area">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-label">
          <span>問題 ${qNum} / ${questions.length}</span>
          <span>${Math.round(pct)}%</span>
        </div>
      </div>
      <div class="question-card" id="qCard">
        <span class="q-emoji">${q.emoji}</span>
        <div class="q-text">${q.text}</div>
        <div class="q-sub">${q.sub}</div>
        <div class="options-grid">
          ${q.options.map((opt, i) => `
            <button class="option-btn" onclick="selectOption(${i})">
              <span class="option-emoji">${opt.emoji}</span>
              <span class="option-text">${opt.text}</span>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ── 選擇答案 ──
  function selectOption(idx) {
    const opt = questions[currentQ].options[idx];

    // 加分
    Object.entries(opt.scores).forEach(([key, val]) => {
      scores[key] = (scores[key] || 0) + val;
    });

    // 視覺反饋
    const btns = document.querySelectorAll('.option-btn');
    btns[idx].classList.add('selected');
    btns.forEach(b => b.style.pointerEvents = 'none');

    // 動畫後跳下一題
    setTimeout(() => {
      const card = document.getElementById('qCard');
      if (card) card.classList.add('leaving');
      setTimeout(() => {
        currentQ++;
        if (currentQ < questions.length) {
          renderQuestion();
        } else {
          renderResult();
        }
      }, 300);
    }, 320);
  }

  // ── 計算結果 ──
  function getResult() {
    return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  }

  // ── 渲染結果 ──
  function renderResult() {
    const key = getResult();
    const c = courses[key];

    // 製作五彩紙屑
    const confettiColors = ['#F5941E','#4B9CD3','#5BAD5B','#F5D021','#C93A2A','#ffb347'];
    const dots = Array.from({length: 18}, (_, i) => {
      const color = confettiColors[i % confettiColors.length];
      const left = Math.random() * 100;
      const delay = Math.random() * 2;
      const dur = 2 + Math.random() * 2;
      const size = 6 + Math.floor(Math.random() * 8);
      const shape = Math.random() > 0.5 ? '50%' : '2px';
      return `<div class="confetti-dot" style="
        left:${left}%; top:-10px; width:${size}px; height:${size}px;
        background:${color}; border-radius:${shape};
        animation-duration:${dur}s; animation-delay:${delay}s;
      "></div>`;
    }).join('');

    wrapper.innerHTML = `
      <div class="result-card">
        <div class="result-header" style="background: ${c.headerBg};">
          <div class="result-confetti">${dots}</div>
          <div class="result-badge" style="background:rgba(0,0,0,0.25);">${c.level}</div>
          <img class="result-char" src="${c.img}" alt="${c.name}" />
          <div class="result-announce" style="color:rgba(255,255,255,0.8);">我們找到最適合你的課程了！</div>
          <div class="result-level" style="color:white;">${c.name}</div>
          <span class="result-age" style="background:rgba(255,255,255,0.2); color:white;">${c.age}</span>
        </div>
        <div class="result-body">
          <div class="result-desc">${c.desc}</div>
          <div class="result-btns">
            <a class="btn-primary-lg" href="https://lin.ee/zFqqFzQ" target="_blank">
              🚀 免費預約體驗課
            </a>
            <a class="btn-outline-lg" href="index.html#courses">
              了解所有課程
            </a>
          </div>
          <button class="retry-btn" onclick="retryQuiz()">↺ 重新測驗</button>
        </div>
      </div>
    `;
  }

  // ── 控制函數 ──
  function startQuiz() {
    currentStep = 'quiz';
    currentQ = 0;
    renderQuestion();
  }

  function retryQuiz() {
    Object.keys(scores).forEach(k => scores[k] = 0);
    currentQ = 0;
    renderIntro();
  }

  // ── 初始化 ──
  renderIntro();
</script>
</body>
</html>
